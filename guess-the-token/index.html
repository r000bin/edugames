<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Next Token</title>
<style>
  :root {
    --bg: #0f1729;
    --bg-card: #1a2340;
    --bg-hover: #243056;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.3);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.15);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.15);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.15);
    --radius: 10px;
    --max-w: 660px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  .screen { display:none; flex-direction:column; width:100%; max-width:var(--max-w); }
  .screen.active { display:flex; }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    transition: all 0.2s;
  }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 14px 32px;
    font-size: 1.1rem;
    font-weight: 600;
  }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }

  /* Language Picker */
  .lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }
  .lang-btn {
    background: var(--bg-card);
    border: 2px solid rgba(99,102,241,0.2);
    color: var(--text);
    padding: 18px 16px;
    border-radius: var(--radius);
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }
  .lang-btn:hover { border-color: var(--accent); background: var(--bg-hover); }
  .lang-flag { font-size: 1.5rem; }

  /* Title Screen */
  #screen-title { align-items:center; justify-content:center; text-align:center; gap:24px; min-height:80vh; }
  #screen-title h1 { font-size:2.4rem; font-weight:800; line-height:1.2; }
  #screen-title h1 span { color:var(--accent); }
  #screen-title .subtitle { color:var(--text-dim); font-size:1.1rem; max-width:480px; line-height:1.6; }
  .title-tokens { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin:8px 0; }
  .title-token {
    background: var(--bg-card);
    border: 1px solid rgba(99,102,241,0.3);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.95rem;
  }

  /* Header */
  .game-header {
    display:flex; justify-content:space-between; align-items:center;
    padding: 12px 0; margin-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .game-header .round-label { color:var(--text-dim); font-size:0.9rem; }
  .game-header .round-title { font-weight:700; font-size:1rem; }
  .game-header .score { font-size:1.1rem; font-weight:700; color:var(--accent); }
  .streak-badge {
    display:inline-block; background:var(--amber); color:#000; font-size:0.75rem;
    font-weight:700; padding:2px 8px; border-radius:99px; margin-left:8px;
  }

  /* Sentence Area */
  .sentence-area {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 24px;
    min-height: 80px;
    margin-bottom: 20px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 1.2rem;
    line-height: 1.8;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .token-span {
    opacity: 0;
    transition: opacity 0.3s;
    padding: 2px 0;
  }
  .token-span.visible { opacity:1; }
  .blank-cursor {
    display: inline-block;
    width: 2px; height: 1.3em;
    background: var(--accent);
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity:0; } }

  /* Options */
  .options-area { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .option-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: var(--radius);
    padding: 0;
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
  }
  .option-row:hover:not(.revealed) { background:var(--bg-hover); border-color:rgba(99,102,241,0.3); }
  .option-row.revealed { cursor:default; }
  .option-key {
    width:36px; min-width:36px; text-align:center;
    font-size:0.8rem; color:var(--text-dim); font-weight:600;
    padding: 14px 0;
  }
  .option-token {
    font-family: 'SF Mono','Fira Code','Consolas', monospace;
    font-size: 1rem;
    font-weight: 600;
    min-width: 100px;
    padding: 14px 8px;
    white-space: pre;
  }
  .prob-bar-container {
    flex: 1;
    height: 28px;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    overflow: hidden;
    margin-right: 12px;
    position: relative;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .prob-bar-container.visible { opacity:1; }
  .prob-bar {
    height: 100%;
    border-radius: 6px;
    width: 0%;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    align-items: center;
    padding-left: 8px;
  }
  .prob-label {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s 0.5s;
  }
  .prob-label.visible { opacity:1; }
  .option-row.correct { border-color: var(--green); background: var(--green-bg); }
  .option-row.chosen-wrong { border-color: var(--amber); background: var(--amber-bg); }
  .option-row.chosen-bad { border-color: var(--red); background: var(--red-bg); }
  .option-row .result-icon {
    font-size: 1.2rem;
    margin-right: 8px;
    opacity: 0;
    transition: opacity 0.3s 0.3s;
  }
  .option-row.revealed .result-icon { opacity:1; }

  /* Explanation */
  .explanation-area {
    background: rgba(99,102,241,0.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 0.95rem;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s;
  }
  .explanation-area.visible { opacity:1; transform:translateY(0); }
  .explanation-area .label { font-weight:700; color:var(--accent); margin-bottom:4px; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; }
  .points-earned {
    display:inline-block; font-weight:700; font-size:0.9rem;
    padding:4px 12px; border-radius:99px; margin-top:8px;
  }
  .points-earned.good { background:var(--green-bg); color:var(--green); }
  .points-earned.ok { background:var(--amber-bg); color:var(--amber); }
  .points-earned.bad { background:var(--red-bg); color:var(--red); }

  .continue-area { display:flex; justify-content:center; padding:8px 0 16px; }

  .progress-area { margin-top:auto; padding-top:16px; }
  .progress-bar-bg {
    height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden;
  }
  .progress-bar-fill {
    height:100%; background:var(--accent); border-radius:3px;
    transition: width 0.4s ease-out;
  }
  .progress-label { text-align:center; font-size:0.8rem; color:var(--text-dim); margin-top:6px; }

  #screen-round-intro { align-items:center; justify-content:center; text-align:center; gap:20px; min-height:60vh; }
  #screen-round-intro .round-num { color:var(--accent); font-size:0.9rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; }
  #screen-round-intro h2 { font-size:1.8rem; font-weight:800; }
  #screen-round-intro .round-desc { color:var(--text-dim); font-size:1.05rem; max-width:480px; line-height:1.6; }
  .concept-badge {
    display:inline-block; background:rgba(99,102,241,0.15); color:var(--accent);
    padding:6px 16px; border-radius:99px; font-size:0.85rem; font-weight:600;
  }

  #screen-round-summary { align-items:center; justify-content:center; text-align:center; gap:20px; min-height:60vh; }
  .summary-score { font-size:2.5rem; font-weight:800; color:var(--accent); }
  .summary-breakdown { color:var(--text-dim); font-size:0.95rem; }
  .takeaway-box {
    background: var(--bg-card);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: var(--radius);
    padding: 20px 24px;
    max-width: 480px;
    text-align: left;
    line-height: 1.6;
  }
  .takeaway-box .takeaway-label { font-weight:700; color:var(--accent); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }

  #screen-complete { align-items:center; justify-content:center; text-align:center; gap:20px; min-height:80vh; }
  #screen-complete h2 { font-size:2rem; font-weight:800; }
  .final-score { font-size:3rem; font-weight:800; color:var(--accent); }
  .final-title {
    font-size:1.3rem; font-weight:700;
    padding:8px 24px; border-radius:99px;
    background:rgba(99,102,241,0.15); color:var(--accent);
  }
  .concepts-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    max-width:480px; width:100%; text-align:left;
  }
  .concept-card {
    background:var(--bg-card); border-radius:var(--radius); padding:12px 16px;
  }
  .concept-card .cc-title { font-weight:700; font-size:0.85rem; margin-bottom:4px; }
  .concept-card .cc-desc { font-size:0.8rem; color:var(--text-dim); line-height:1.4; }
  .btn-secondary {
    background:var(--bg-card); color:var(--text); padding:12px 24px;
    border:1px solid rgba(255,255,255,0.1); font-weight:600;
  }
  .btn-secondary:hover { background:var(--bg-hover); }

  @media (max-width:500px) {
    #screen-title h1 { font-size:1.8rem; }
    .sentence-area { font-size:1rem; padding:16px; }
    .option-token { min-width:70px; font-size:0.9rem; }
    .concepts-grid { grid-template-columns:1fr; }
    .lang-grid { grid-template-columns:1fr; max-width:240px; }
  }
</style>
</head>
<body>

<!-- Title Screen -->
<div id="screen-title" class="screen active">
  <h1 id="title-heading">Guess the<br><span>Next Token</span></h1>
  <div class="title-tokens" id="title-tokens"></div>
  <p class="subtitle" id="title-subtitle"></p>
  <div class="lang-grid" id="lang-grid"></div>
</div>

<!-- Round Intro -->
<div id="screen-round-intro" class="screen">
  <span class="round-num" id="intro-round-num"></span>
  <h2 id="intro-title"></h2>
  <p class="round-desc" id="intro-desc"></p>
  <span class="concept-badge" id="intro-concept"></span>
  <button class="btn-primary" id="btn-begin" onclick="startRound()"></button>
</div>

<!-- Game Play -->
<div id="screen-play" class="screen">
  <div class="game-header">
    <div>
      <div class="round-label" id="play-round-label"></div>
      <div class="round-title" id="play-round-title"></div>
    </div>
    <div>
      <span class="score" id="play-score">0</span>
      <span class="streak-badge" id="streak-badge" style="display:none"></span>
    </div>
  </div>
  <div class="sentence-area" id="sentence-area"></div>
  <div class="options-area" id="options-area"></div>
  <div class="explanation-area" id="explanation-area">
    <div class="label" id="explanation-label"></div>
    <p id="explanation-text"></p>
    <div id="points-display"></div>
  </div>
  <div class="continue-area">
    <button class="btn-primary" id="btn-continue" style="display:none" onclick="nextStep()"></button>
  </div>
  <div class="progress-area">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label"></div>
  </div>
</div>

<!-- Round Summary -->
<div id="screen-round-summary" class="screen">
  <span class="round-num" id="summary-round-num"></span>
  <div class="summary-score" id="summary-score"></div>
  <div class="summary-breakdown" id="summary-breakdown"></div>
  <div class="takeaway-box">
    <div class="takeaway-label" id="summary-takeaway-label"></div>
    <p id="summary-takeaway"></p>
  </div>
  <button class="btn-primary" id="btn-next-round" onclick="nextRound()"></button>
</div>

<!-- Game Complete -->
<div id="screen-complete" class="screen">
  <h2 id="complete-heading"></h2>
  <div class="final-score" id="final-score"></div>
  <div class="final-title" id="final-title"></div>
  <p style="color:var(--text-dim);max-width:480px;line-height:1.6" id="final-desc"></p>
  <div class="concepts-grid" id="concepts-grid"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn-primary" id="btn-play-again" onclick="location.reload()"></button>
    <button class="btn-secondary" id="btn-share" onclick="shareScore()"></button>
  </div>
</div>

};

// ==================== STATE ====================
let lang = 'en';
let gameData = null;
const state = {
  round: 0, sentence: 0, prediction: 0,
  score: 0, streak: 0,
  roundScore: 0, roundCorrect: 0, roundTotal: 0,
  totalPredictions: 0, completedPredictions: 0, maxScore: 0,
};

const $ = id => document.getElementById(id);
const show = id => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); $(id).classList.add('active'); };
const delay = ms => new Promise(r => setTimeout(r, ms));
const t = () => UI[lang];

function getCurrentRound() { return gameData.rounds[state.round]; }
function getCurrentSentence() { return getCurrentRound().sentences[state.sentence]; }
function getCurrentPrediction() { return getCurrentSentence().predictions[state.prediction]; }

// ==================== INIT TITLE SCREEN ====================
function initTitle() {
  const langs = [
    { code: 'en', flag: '\ud83c\uddec\ud83c\udde7', label: 'English' },
    { code: 'de', flag: '\ud83c\udde9\ud83c\uddea', label: 'Deutsch' },
    { code: 'fr', flag: '\ud83c\uddeb\ud83c\uddf7', label: 'Fran\u00e7ais' },
    { code: 'it', flag: '\ud83c\uddee\ud83c\uddf9', label: 'Italiano' },
  ];
  const grid = $('lang-grid');
  grid.innerHTML = '';
  langs.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.innerHTML = `<span class="lang-flag">${l.flag}</span>${l.label}`;
    btn.addEventListener('click', () => startWithLang(l.code));
    grid.appendChild(btn);
  });
  updateTitleScreen();
}

function updateTitleScreen() {
  $('title-heading').innerHTML = t().titleHeading;
  const tokensEl = $('title-tokens');
  tokensEl.innerHTML = '';
  t().titleTokens.forEach((tk, i) => {
    const span = document.createElement('span');
    span.className = 'title-token';
    span.textContent = tk;
    if (i === t().titleTokens.length - 1) span.style.color = 'var(--accent)';
    tokensEl.appendChild(span);
  });
  $('title-subtitle').textContent = t().subtitle;
}

function startWithLang(code) {
  lang = code;
  document.documentElement.lang = code;
  gameData = GAME_DATA_ALL[code];

  state.round = 0; state.score = 0; state.streak = 0;
  state.completedPredictions = 0;
  state.totalPredictions = 0; state.maxScore = 0;
  gameData.rounds.forEach(r => r.sentences.forEach(s => {
    state.totalPredictions += s.predictions.length;
    s.predictions.forEach(() => state.maxScore += 100);
  }));

  showRoundIntro();
}

// ==================== GAME FLOW ====================
function showRoundIntro() {
  const round = getCurrentRound();
  $('intro-round-num').textContent = t().roundN(state.round + 1, gameData.rounds.length);
  $('intro-title').textContent = round.title;
  $('intro-desc').textContent = round.description;
  $('intro-concept').textContent = round.concept;
  $('btn-begin').textContent = t().begin;
  show('screen-round-intro');
}

function startRound() {
  state.sentence = 0;
  state.prediction = 0;
  state.roundScore = 0;
  state.roundCorrect = 0;
  state.roundTotal = 0;
  show('screen-play');
  updateHeader();
  showPrediction();
}

async function showPrediction() {
  const sentence = getCurrentSentence();
  const pred = getCurrentPrediction();
  updateHeader();

  $('sentence-area').innerHTML = '';
  $('options-area').innerHTML = '';
  $('explanation-area').classList.remove('visible');
  $('btn-continue').style.display = 'none';
  $('points-display').innerHTML = '';
  $('explanation-label').textContent = t().howItWorks;
  $('btn-continue').textContent = t().continue_;

  for (let i = 0; i <= pred.afterIndex; i++) {
    const span = document.createElement('span');
    span.className = 'token-span';
    span.textContent = sentence.tokens[i];
    $('sentence-area').appendChild(span);
    await delay(120);
    span.classList.add('visible');
  }

  const cursor = document.createElement('span');
  cursor.className = 'blank-cursor';
  $('sentence-area').appendChild(cursor);

  await delay(300);
  const shuffled = pred.options.map((o, i) => ({ ...o, origIndex: i }));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  shuffled.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `
      <span class="option-key">${i + 1}</span>
      <span class="option-token">${opt.token}</span>
      <div class="prob-bar-container">
        <div class="prob-bar" style="background:var(--accent)"></div>
        <span class="prob-label">${(opt.prob * 100).toFixed(1)}%</span>
      </div>
      <span class="result-icon"></span>
    `;
    row.addEventListener('click', () => selectOption(row, opt, shuffled));
    $('options-area').appendChild(row);
  });

  updateProgress();
}

function selectOption(row, chosen, allOptions) {
  if (row.closest('.options-area').querySelector('.revealed')) return;

  const isCorrect = chosen.origIndex === 0;
  let points = 0, pointClass = 'bad';
  if (isCorrect) {
    points = 100; pointClass = 'good';
    state.streak++; state.roundCorrect++;
  } else if (chosen.prob >= 0.10) {
    points = 50; pointClass = 'ok'; state.streak = 0;
  } else if (chosen.prob >= 0.05) {
    points = 25; pointClass = 'ok'; state.streak = 0;
  } else {
    points = 5; state.streak = 0;
  }
  if (state.streak >= 3) points = Math.round(points * 1.5);

  state.score += points;
  state.roundScore += points;
  state.roundTotal++;

  const rows = $('options-area').querySelectorAll('.option-row');
  rows.forEach((r, i) => {
    r.classList.add('revealed');
    const opt = allOptions[i];
    const bar = r.querySelector('.prob-bar');
    const container = r.querySelector('.prob-bar-container');
    const label = r.querySelector('.prob-label');
    const icon = r.querySelector('.result-icon');
    container.classList.add('visible');

    if (opt.origIndex === 0) {
      bar.style.background = 'var(--green)';
      r.classList.add('correct');
      icon.textContent = '\u2713'; icon.style.color = 'var(--green)';
    } else {
      bar.style.background = 'var(--accent)';
    }
    if (r === row && !isCorrect) {
      r.classList.add(chosen.prob >= 0.05 ? 'chosen-wrong' : 'chosen-bad');
      icon.textContent = '\u2717';
      icon.style.color = chosen.prob >= 0.05 ? 'var(--amber)' : 'var(--red)';
    }
    setTimeout(() => {
      bar.style.width = `${Math.max(opt.prob * 100, 2)}%`;
      label.classList.add('visible');
    }, i * 100 + 50);
  });

  const pred = getCurrentPrediction();
  setTimeout(() => {
    $('explanation-text').textContent = pred.explanation;
    const streakText = state.streak >= 3 ? ` ${t().streakBonus}` : '';
    $('points-display').innerHTML = `<span class="points-earned ${pointClass}">${t().points(points)}${streakText}</span>`;
    $('explanation-area').classList.add('visible');
    $('btn-continue').style.display = '';
  }, 600);

  $('play-score').textContent = state.score;
  updateStreakBadge();
}

function nextStep() {
  state.completedPredictions++;
  const sentence = getCurrentSentence();
  if (state.prediction + 1 < sentence.predictions.length) {
    state.prediction++; showPrediction(); return;
  }
  const round = getCurrentRound();
  if (state.sentence + 1 < round.sentences.length) {
    state.sentence++; state.prediction = 0; showPrediction(); return;
  }
  showRoundSummary();
}

function showRoundSummary() {
  const round = getCurrentRound();
  $('summary-round-num').textContent = t().roundComplete(state.round + 1);
  $('summary-score').textContent = `+${state.roundScore}`;
  $('summary-breakdown').textContent = t().topPredictions(state.roundCorrect, state.roundTotal, state.score);
  $('summary-takeaway-label').textContent = t().keyTakeaway;
  $('summary-takeaway').textContent = round.takeaway;
  $('btn-next-round').textContent = state.round + 1 >= gameData.rounds.length ? t().seeResults : t().nextRound;
  show('screen-round-summary');
}

function nextRound() {
  if (state.round + 1 >= gameData.rounds.length) { showGameComplete(); return; }
  state.round++; state.sentence = 0; state.prediction = 0;
  showRoundIntro();
}

function showGameComplete() {
  const pct = state.score / state.maxScore;
  const idx = pct >= 0.9 ? 4 : pct >= 0.75 ? 3 : pct >= 0.5 ? 2 : pct >= 0.25 ? 1 : 0;

  $('complete-heading').textContent = t().gameComplete;
  $('final-score').textContent = state.score;
  $('final-title').textContent = t().titles[idx];
  $('final-desc').textContent = t().titleDescs[idx];
  $('btn-play-again').textContent = t().playAgain;
  $('btn-share').textContent = t().copyScore;

  const grid = $('concepts-grid');
  grid.innerHTML = '';
  t().concepts.forEach(([title, desc]) => {
    const card = document.createElement('div');
    card.className = 'concept-card';
    card.innerHTML = `<div class="cc-title">${title}</div><div class="cc-desc">${desc}</div>`;
    grid.appendChild(card);
  });

  show('screen-complete');
}

// ==================== UI HELPERS ====================
function updateHeader() {
  $('play-round-label').textContent = t().roundN(state.round + 1, gameData.rounds.length);
  $('play-round-title').textContent = getCurrentRound().title;
  $('play-score').textContent = state.score;
  updateStreakBadge();
}

function updateStreakBadge() {
  const badge = $('streak-badge');
  if (state.streak >= 3) {
    badge.style.display = ''; badge.textContent = `${state.streak} streak \u00d7 1.5`;
  } else { badge.style.display = 'none'; }
}

function updateProgress() {
  $('progress-fill').style.width = `${(state.completedPredictions / state.totalPredictions) * 100}%`;
  $('progress-label').textContent = t().stepN(state.completedPredictions + 1, state.totalPredictions);
}

function shareScore() {
  const pct = state.score / state.maxScore;
  const idx = pct >= 0.9 ? 4 : pct >= 0.75 ? 3 : pct >= 0.5 ? 2 : pct >= 0.25 ? 1 : 0;
  navigator.clipboard.writeText(t().shareText(state.score, t().titles[idx])).then(() => {
    const btn = $('btn-share');
    btn.textContent = t().copied;
    setTimeout(() => btn.textContent = t().copyScore, 2000);
  });
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '5') {
    const rows = $('options-area').querySelectorAll('.option-row');
    const idx = parseInt(e.key) - 1;
    if (idx < rows.length && !rows[0]?.classList.contains('revealed')) rows[idx].click();
  }
  if (e.key === 'Enter' || e.key === ' ') {
    const cont = $('btn-continue');
    if (cont.style.display !== 'none') { e.preventDefault(); cont.click(); return; }
    const active = document.querySelector('.screen.active');
    if (active) {
      const btn = active.querySelector('.btn-primary');
      if (btn) { e.preventDefault(); btn.click(); }
    }
  }
});

initTitle();
</script>
