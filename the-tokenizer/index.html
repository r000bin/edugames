<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tokenizer</title>
<style>
  :root {
    --bg: #0f1729;
    --bg-card: #1a2340;
    --bg-hover: #243056;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent: #6366f1;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.15);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.15);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.15);
    --radius: 10px;
    --max-w: 700px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; justify-content: center; padding: 16px;
  }
  .screen { display:none; flex-direction:column; width:100%; max-width:var(--max-w); }
  .screen.active { display:flex; }
  button { font-family:inherit; cursor:pointer; border:none; border-radius:var(--radius); font-size:1rem; transition:all 0.2s; }
  button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .btn-primary { background:var(--accent); color:#fff; padding:14px 32px; font-size:1.1rem; font-weight:600; }
  .btn-primary:hover { filter:brightness(1.15); transform:translateY(-1px); }
  .btn-secondary { background:var(--bg-card); color:var(--text); padding:12px 24px; border:1px solid rgba(255,255,255,0.1); font-weight:600; }
  .btn-secondary:hover { background:var(--bg-hover); }

  /* Language picker */
  .lang-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:360px; }
  .lang-btn { background:var(--bg-card); border:2px solid rgba(99,102,241,0.2); color:var(--text); padding:18px 16px; border-radius:var(--radius); font-size:1.1rem; font-weight:600; display:flex; align-items:center; gap:10px; justify-content:center; }
  .lang-btn:hover { border-color:var(--accent); background:var(--bg-hover); }
  .lang-flag { font-size:1.5rem; }

  /* Title */
  #screen-title { align-items:center; justify-content:center; text-align:center; gap:24px; min-height:80vh; }
  #screen-title h1 { font-size:2.4rem; font-weight:800; line-height:1.2; }
  #screen-title h1 span { color:var(--accent); }
  #screen-title .subtitle { color:var(--text-dim); font-size:1.1rem; max-width:500px; line-height:1.6; }
  .demo-tokens { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; margin:8px 0; }
  .demo-tok { padding:6px 10px; border-radius:6px; font-family:'SF Mono','Fira Code','Consolas',monospace; font-size:0.9rem; font-weight:600; }

  /* Header */
  .game-header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; margin-bottom:16px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .game-header .round-label { color:var(--text-dim); font-size:0.9rem; }
  .game-header .round-title { font-weight:700; font-size:1rem; }
  .game-header .score { font-size:1.1rem; font-weight:700; color:var(--accent); }

  /* Tokenizer area */
  .instruction { color:var(--text-dim); font-size:0.9rem; margin-bottom:12px; text-align:center; }
  .text-area {
    background: var(--bg-card); border-radius: var(--radius); padding: 20px 12px;
    margin-bottom: 16px; min-height: 80px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    font-size: 1.25rem; line-height: 1;
    display: flex; flex-wrap: wrap; align-items: stretch;
    user-select: none; position: relative; gap: 0;
  }
  .char-span {
    padding: 10px 2px;
    white-space: pre;
  }
  .gap-btn {
    width: 20px; min-width: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    border-radius: 4px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .gap-btn:hover { background: rgba(99,102,241,0.1); }
  .gap-btn::before {
    content: '';
    width: 2px; height: 60%;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    transition: all 0.15s;
  }
  .gap-btn:hover::before { background: rgba(99,102,241,0.4); height: 80%; }
  .gap-btn.active { background: rgba(99,102,241,0.15); }
  .gap-btn.active::before {
    width: 3px; height: 90%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(99,102,241,0.5);
    animation: markerPop 0.2s ease-out;
  }
  @keyframes markerPop { from { transform:scaleY(0); } to { transform:scaleY(1); } }

  @media (max-width:500px) {
    .gap-btn { width: 28px; min-width: 28px; }
    .text-area { padding: 16px 8px; font-size: 1.1rem; }
  }

  /* Revealed tokens */
  .revealed-area {
    background: var(--bg-card); border-radius: var(--radius); padding: 20px 24px;
    margin-bottom: 16px; min-height: 60px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    font-size: 1.2rem; line-height: 2.2;
    display: flex; flex-wrap: wrap; gap: 4px; align-items: baseline;
  }
  .tok-chip {
    padding: 4px 8px; border-radius: 5px; font-weight: 600;
    white-space: pre; border: 2px solid transparent;
  }
  .tok-chip.matched { border-color: var(--green); }
  .tok-chip.missed { border-color: var(--amber); }

  /* Score display row */
  .score-row {
    display: flex; justify-content: center; gap: 24px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .score-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 99px;
    font-weight: 600; font-size: 0.9rem;
  }
  .score-pill.good { background: var(--green-bg); color: var(--green); }
  .score-pill.ok { background: var(--amber-bg); color: var(--amber); }
  .score-pill.bad { background: var(--red-bg); color: var(--red); }

  /* Explanation */
  .explanation-area {
    background: rgba(99,102,241,0.08); border-left:3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 16px 20px; margin-bottom: 16px;
    font-size: 0.95rem; line-height: 1.6;
    opacity:0; transform:translateY(8px); transition:all 0.4s;
  }
  .explanation-area.visible { opacity:1; transform:translateY(0); }
  .explanation-area .label { font-weight:700; color:var(--accent); margin-bottom:4px; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; }

  .btn-row { display:flex; justify-content:center; gap:12px; padding:8px 0 16px; flex-wrap:wrap; }

  /* Progress */
  .progress-area { margin-top:auto; padding-top:16px; }
  .progress-bar-bg { height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.4s ease-out; }
  .progress-label { text-align:center; font-size:0.8rem; color:var(--text-dim); margin-top:6px; }

  /* Round screens */
  #screen-round-intro { align-items:center; justify-content:center; text-align:center; gap:20px; min-height:60vh; }
  #screen-round-intro .round-num { color:var(--accent); font-size:0.9rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; }
  #screen-round-intro h2 { font-size:1.8rem; font-weight:800; }
  #screen-round-intro .round-desc { color:var(--text-dim); font-size:1.05rem; max-width:500px; line-height:1.6; }
  .concept-badge { display:inline-block; background:rgba(99,102,241,0.15); color:var(--accent); padding:6px 16px; border-radius:99px; font-size:0.85rem; font-weight:600; }

  #screen-round-summary { align-items:center; justify-content:center; text-align:center; gap:20px; min-height:60vh; }
  .summary-score { font-size:2.5rem; font-weight:800; color:var(--accent); }
  .summary-breakdown { color:var(--text-dim); font-size:0.95rem; }
  .takeaway-box { background:var(--bg-card); border:1px solid rgba(99,102,241,0.2); border-radius:var(--radius); padding:20px 24px; max-width:500px; text-align:left; line-height:1.6; }
  .takeaway-box .takeaway-label { font-weight:700; color:var(--accent); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }

  #screen-complete { align-items:center; justify-content:center; text-align:center; gap:20px; min-height:80vh; }
  #screen-complete h2 { font-size:2rem; font-weight:800; }
  .final-score { font-size:3rem; font-weight:800; color:var(--accent); }
  .final-title { font-size:1.3rem; font-weight:700; padding:8px 24px; border-radius:99px; background:rgba(99,102,241,0.15); color:var(--accent); }
  .concepts-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:500px; width:100%; text-align:left; }
  .concept-card { background:var(--bg-card); border-radius:var(--radius); padding:12px 16px; }
  .concept-card .cc-title { font-weight:700; font-size:0.85rem; margin-bottom:4px; }
  .concept-card .cc-desc { font-size:0.8rem; color:var(--text-dim); line-height:1.4; }

  .back-link { color:var(--text-dim); text-decoration:none; font-size:0.9rem; position:fixed; top:16px; left:16px; }
  .back-link:hover { color:var(--text); }

  /* Token colors palette */
  .tc0 { background:rgba(99,102,241,0.2); }
  .tc1 { background:rgba(34,197,94,0.2); }
  .tc2 { background:rgba(245,158,11,0.2); }
  .tc3 { background:rgba(236,72,153,0.2); }
  .tc4 { background:rgba(14,165,233,0.2); }
  .tc5 { background:rgba(168,85,247,0.2); }
  .tc6 { background:rgba(251,146,60,0.2); }
  .tc7 { background:rgba(45,212,191,0.2); }

  @media (max-width:500px) {
    #screen-title h1 { font-size:1.8rem; }
    .concepts-grid { grid-template-columns:1fr; }
    .lang-grid { grid-template-columns:1fr; max-width:240px; }
  }
</style>
</head>
<body>

<a href="../" class="back-link">&larr; All Games</a>

<!-- Title -->
<div id="screen-title" class="screen active">
  <h1>The<br><span>Tokenizer</span></h1>
  <div class="demo-tokens">
    <span class="demo-tok tc0">Hello</span>
    <span class="demo-tok tc1">,</span>
    <span class="demo-tok tc2"> world</span>
    <span class="demo-tok tc3">!</span>
  </div>
  <p class="subtitle" id="title-subtitle"></p>
  <div class="lang-grid" id="lang-grid"></div>
</div>

<!-- Round Intro -->
<div id="screen-round-intro" class="screen">
  <span class="round-num" id="intro-round-num"></span>
  <h2 id="intro-title"></h2>
  <p class="round-desc" id="intro-desc"></p>
  <span class="concept-badge" id="intro-concept"></span>
  <button class="btn-primary" id="btn-begin" onclick="startRound()"></button>
</div>

<!-- Game Play -->
<div id="screen-play" class="screen">
  <div class="game-header">
    <div>
      <div class="round-label" id="play-round-label"></div>
      <div class="round-title" id="play-round-title"></div>
    </div>
    <span class="score" id="play-score">0</span>
  </div>
  <div class="instruction" id="play-instruction"></div>
  <div class="text-area" id="text-area"></div>
  <div class="btn-row" id="submit-row">
    <button class="btn-secondary" id="btn-clear" onclick="clearSplits()"></button>
    <button class="btn-primary" id="btn-submit" onclick="submitSplits()"></button>
  </div>
  <div class="revealed-area" id="revealed-area" style="display:none"></div>
  <div class="score-row" id="score-row" style="display:none"></div>
  <div class="explanation-area" id="explanation-area">
    <div class="label" id="explanation-label"></div>
    <p id="explanation-text"></p>
  </div>
  <div class="btn-row" id="continue-row" style="display:none">
    <button class="btn-primary" id="btn-continue" onclick="nextChallenge()"></button>
  </div>
  <div class="progress-area">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label"></div>
  </div>
</div>

<!-- Round Summary -->
<div id="screen-round-summary" class="screen">
  <span class="round-num" id="summary-round-num"></span>
  <div class="summary-score" id="summary-score"></div>
  <div class="summary-breakdown" id="summary-breakdown"></div>
  <div class="takeaway-box">
    <div class="takeaway-label" id="summary-takeaway-label"></div>
    <p id="summary-takeaway"></p>
  </div>
  <button class="btn-primary" id="btn-next-round" onclick="nextRound()"></button>
</div>

<!-- Complete -->
<div id="screen-complete" class="screen">
  <h2 id="complete-heading"></h2>
  <div class="final-score" id="final-score"></div>
  <div class="final-title" id="final-title"></div>
  <p style="color:var(--text-dim);max-width:500px;line-height:1.6" id="final-desc"></p>
  <div class="concepts-grid" id="concepts-grid"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn-primary" id="btn-play-again" onclick="location.reload()"></button>
    <button class="btn-secondary" onclick="window.location.href='../'">&#8592; <span id="btn-all-games"></span></button>
  </div>
</div>

    challenges: [
      { text: "Prezzo: 1.234,56\u20ac", tokens: ["Pre","zzo",":"," ","1",".","234",",","56","\u20ac"], explanation: "Il prezzo diventa 8 token numerici! Ogni segno di punteggiatura e ogni gruppo di cifre \u00e8 separato. Il '\u20ac' \u00e8 un token a parte." },

      { text: "Adoro \u2764\ufe0f Roma \ud83c\uddee\ud83c\uddf9", tokens: ["Ad","oro"," \u2764","\\ufe0f"," Roma"," \ud83c\uddee","\ud83c\uddf9"], explanation: "Il cuore \u00e8 2 token, la bandiera italiana anche 2 token. 'Roma' resta un solo token perch\u00e9 \u00e8 molto frequente. 'Adoro' si divide in 'Ad'+'oro'." },

      { text: "L'IA non sa scrivere \"fragola\"", tokens: ["L","'","IA"," non"," sa"," scrivere"," \"","frag","ola","\""], explanation: "'fragola' \u00e8 diviso in 'frag'+'ola'. L\u2019apostrofo crea una divisione. Le virgolette costano un token ciascuna. 10 token per 7 parole!" },
      { text: "info@esempio.it/percorso", tokens: ["info","@","esempio",".it","/","perc","orso"], explanation: "'.it' resta un solo token (dominio molto comune). 'esempio' \u00e8 abbastanza frequente da restare intero. 'percorso' si divide." },
      { text: "Tokyo (\u6771\u4eac) \ud83c\uddef\ud83c\uddf5 \u00e8 bella", tokens: ["Tokyo"," (","\\u6771","\\u4eac",")"," \ud83c\uddef","\ud83c\uddf5"," \u00e8"," bella"], explanation: "Il mix definitivo! Inglese ('Tokyo'), giapponese (2 token per 2 caratteri), bandiera (2 token), italiano ('\u00e8', 'bella'). Stessa informazione, costi diversi per ogni scrittura." }
    ]
  }

};

// ==================== STATE ====================
let lang = 'en';
let gameData = null;
const state = {
  round: 0, challenge: 0, score: 0,
  roundScore: 0, roundPerfect: 0, roundTotal: 0,
  totalChallenges: 0, completedChallenges: 0, maxScore: 0,
  userSplits: new Set() // char indices where user placed splits
};

const $ = id => document.getElementById(id);
const show = id => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); $(id).classList.add('active'); };
const t = () => UI[lang];

function getCurRound() { return gameData.rounds[state.round]; }
function getCurChallenge() { return getCurRound().challenges[state.challenge]; }

// ==================== INIT ====================
function init() {
  const langs = [
    { code:'en', flag:'\ud83c\uddec\ud83c\udde7', label:'English' },
    { code:'de', flag:'\ud83c\udde9\ud83c\uddea', label:'Deutsch' },
    { code:'fr', flag:'\ud83c\uddeb\ud83c\uddf7', label:'Fran\u00e7ais' },
    { code:'it', flag:'\ud83c\uddee\ud83c\uddf9', label:'Italiano' },
  ];
  const grid = $('lang-grid');
  grid.innerHTML = '';
  langs.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.innerHTML = `<span class="lang-flag">${l.flag}</span>${l.label}`;
    btn.addEventListener('click', () => startWithLang(l.code));
    grid.appendChild(btn);
  });
  $('title-subtitle').textContent = UI.en.subtitle;
}

function startWithLang(code) {
  lang = code;
  document.documentElement.lang = code;
  gameData = GAME_DATA_ALL[code];
  $('title-subtitle').textContent = t().subtitle;

  state.round = 0; state.score = 0; state.completedChallenges = 0;
  state.totalChallenges = 0; state.maxScore = 0;
  gameData.rounds.forEach(r => {
    state.totalChallenges += r.challenges.length;
    state.maxScore += r.challenges.length * 100;
  });

  showRoundIntro();
}

// ==================== GAME FLOW ====================
function showRoundIntro() {
  const round = getCurRound();
  $('intro-round-num').textContent = t().roundN(state.round + 1, gameData.rounds.length);
  $('intro-title').textContent = round.title;
  $('intro-desc').textContent = round.description;
  $('intro-concept').textContent = round.concept;
  $('btn-begin').textContent = t().begin;
  show('screen-round-intro');
}

function startRound() {
  state.challenge = 0;
  state.roundScore = 0; state.roundPerfect = 0; state.roundTotal = 0;
  show('screen-play');
  showChallenge();
}

function showChallenge() {
  const round = getCurRound();
  const ch = getCurChallenge();

  $('play-round-label').textContent = t().roundN(state.round + 1, gameData.rounds.length);
  $('play-round-title').textContent = round.title;
  $('play-score').textContent = state.score;
  $('play-instruction').textContent = t().instruction;
  $('btn-submit').textContent = t().submit;
  $('btn-clear').textContent = t().clear;
  $('explanation-label').textContent = t().howItWorks;

  // Reset UI
  $('revealed-area').style.display = 'none';
  $('score-row').style.display = 'none';
  $('explanation-area').classList.remove('visible');
  $('continue-row').style.display = 'none';
  $('submit-row').style.display = 'flex';
  state.userSplits = new Set();

  // Build character grid with tap-friendly gap buttons
  const area = $('text-area');
  area.innerHTML = '';
  const text = ch.text;
  for (let i = 0; i < text.length; i++) {
    // Gap button before this character (not before first)
    if (i > 0) {
      const gap = document.createElement('div');
      gap.className = 'gap-btn';
      gap.dataset.splitAt = i;
      gap.addEventListener('click', () => toggleGap(gap, i));
      area.appendChild(gap);
    }
    const span = document.createElement('span');
    span.className = 'char-span';
    span.textContent = text[i];
    area.appendChild(span);
  }

  updateProgress();
}

function escHtml(c) {
  return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleGap(gapEl, splitAt) {
  if (state.userSplits.has(splitAt)) {
    state.userSplits.delete(splitAt);
    gapEl.classList.remove('active');
  } else {
    state.userSplits.add(splitAt);
    gapEl.classList.add('active');
  }
}

function clearSplits() {
  state.userSplits.clear();
  $('text-area').querySelectorAll('.gap-btn').forEach(g => g.classList.remove('active'));
}

function submitSplits() {
  const ch = getCurChallenge();
  const text = ch.text;

  // Calculate actual split positions from tokens
  const actualSplits = new Set();
  let pos = 0;
  for (const tok of ch.tokens) {
    // Handle display tokens (some use escape sequences for visual clarity)
    let tokText = tok;
    // The actual text positions
    pos += tokText.length;
    if (pos < text.length) actualSplits.add(pos);
  }

  // Score: count matching splits
  const userArr = [...state.userSplits].sort((a,b) => a-b);
  const actualArr = [...actualSplits].sort((a,b) => a-b);

  let matched = 0;
  for (const s of userArr) {
    if (actualSplits.has(s)) matched++;
  }

  const totalSplits = actualArr.length;
  const extraSplits = userArr.length - matched;
  const missedSplits = totalSplits - matched;

  // Score: base on accuracy
  let points = 0;
  if (matched === totalSplits && extraSplits === 0) {
    points = 100; state.roundPerfect++;
  } else if (totalSplits > 0) {
    const precision = userArr.length > 0 ? matched / userArr.length : 0;
    const recall = matched / totalSplits;
    const f1 = precision + recall > 0 ? 2 * precision * recall / (precision + recall) : 0;
    points = Math.round(f1 * 80);
  }

  state.score += points;
  state.roundScore += points;
  state.roundTotal++;

  // Hide submit, show results
  $('submit-row').style.display = 'none';

  // Show revealed tokens
  const revealed = $('revealed-area');
  revealed.style.display = 'flex';
  revealed.innerHTML = '';
  ch.tokens.forEach((tok, i) => {
    const chip = document.createElement('span');
    chip.className = `tok-chip tc${i % 8}`;
    chip.textContent = tok;

    // Check if boundaries of this token were correctly identified
    revealed.appendChild(chip);
  });

  // Score display
  const scoreRow = $('score-row');
  scoreRow.style.display = 'flex';
  const quality = points >= 100 ? 'good' : points >= 50 ? 'ok' : 'bad';
  const qualityLabel = points >= 100 ? t().perfect : points >= 70 ? t().great : points >= 40 ? t().good : t().missed;
  scoreRow.innerHTML = `
    <span class="score-pill ${quality}">${qualityLabel} +${points}</span>
    <span class="score-pill ok">${t().tokensCount(ch.tokens.length)}</span>
  `;

  // Explanation
  $('explanation-text').textContent = ch.explanation;
  $('explanation-area').classList.add('visible');

  // Continue
  $('continue-row').style.display = 'flex';
  $('btn-continue').textContent = t().continue_;

  // Update score header
  $('play-score').textContent = state.score;
}

function nextChallenge() {
  state.completedChallenges++;
  const round = getCurRound();
  if (state.challenge + 1 < round.challenges.length) {
    state.challenge++;
    showChallenge();
    return;
  }
  showRoundSummary();
}

function showRoundSummary() {
  const round = getCurRound();
  $('summary-round-num').textContent = t().roundComplete(state.round + 1);
  $('summary-score').textContent = `+${state.roundScore}`;
  $('summary-breakdown').textContent = t().breakdown(state.roundPerfect, state.roundTotal, state.score);
  $('summary-takeaway-label').textContent = t().keyTakeaway;
  $('summary-takeaway').textContent = round.takeaway;
  $('btn-next-round').textContent = state.round + 1 >= gameData.rounds.length ? t().seeResults : t().nextRound;
  show('screen-round-summary');
}

function nextRound() {
  if (state.round + 1 >= gameData.rounds.length) { showComplete(); return; }
  state.round++; state.challenge = 0;
  showRoundIntro();
}

function showComplete() {
  const pct = state.score / state.maxScore;
  const idx = pct >= 0.9 ? 4 : pct >= 0.75 ? 3 : pct >= 0.5 ? 2 : pct >= 0.25 ? 1 : 0;

  $('complete-heading').textContent = t().gameComplete;
  $('final-score').textContent = state.score;
  $('final-title').textContent = t().titles[idx];
  $('final-desc').textContent = t().titleDescs[idx];
  $('btn-play-again').textContent = t().playAgain;
  $('btn-all-games').textContent = t().allGames;

  const grid = $('concepts-grid');
  grid.innerHTML = '';
  t().concepts.forEach(([title, desc]) => {
    const card = document.createElement('div');
    card.className = 'concept-card';
    card.innerHTML = `<div class="cc-title">${title}</div><div class="cc-desc">${desc}</div>`;
    grid.appendChild(card);
  });

  show('screen-complete');
}

function updateProgress() {
  $('progress-fill').style.width = `${(state.completedChallenges / state.totalChallenges) * 100}%`;
  $('progress-label').textContent = t().stepN(state.completedChallenges + 1, state.totalChallenges);
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const contRow = $('continue-row');
    if (contRow.style.display !== 'none') {
      e.preventDefault();
      $('btn-continue').click();
      return;
    }
    const submitRow = $('submit-row');
    if (submitRow.style.display !== 'none' && document.querySelector('#screen-play.active')) {
      e.preventDefault();
      $('btn-submit').click();
      return;
    }
    const active = document.querySelector('.screen.active');
    if (active) {
      const btn = active.querySelector('.btn-primary');
      if (btn) { e.preventDefault(); btn.click(); }
    }
  }
});

// Auto-start if lang passed via URL
const urlLang = new URLSearchParams(window.location.search).get('lang');
if (urlLang && GAME_DATA_ALL[urlLang]) {
  init();
  startWithLang(urlLang);
} else {
  init();
}
</script>
