<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attention Spotlight</title>
<style>
  :root {
    --bg:#0f1729;--bg-card:#1a2340;--bg-hover:#243056;
    --text:#e2e8f0;--text-dim:#8892a8;--accent:#6366f1;
    --green:#22c55e;--green-bg:rgba(34,197,94,0.15);
    --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.15);
    --red:#ef4444;--red-bg:rgba(239,68,68,0.15);
    --radius:10px;--max-w:700px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:16px;}
  .screen{display:none;flex-direction:column;width:100%;max-width:var(--max-w);}
  .screen.active{display:flex;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--radius);font-size:1rem;transition:all 0.2s;}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .btn-primary{background:var(--accent);color:#fff;padding:14px 32px;font-size:1.1rem;font-weight:600;}
  .btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px);}
  .btn-secondary{background:var(--bg-card);color:var(--text);padding:12px 24px;border:1px solid rgba(255,255,255,0.1);font-weight:600;}
  .btn-secondary:hover{background:var(--bg-hover);}
  .back-link{color:var(--text-dim);text-decoration:none;font-size:0.9rem;position:fixed;top:16px;left:16px;z-index:10;}
  .back-link:hover{color:var(--text);}

  .lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px;}
  .lang-btn{background:var(--bg-card);border:2px solid rgba(99,102,241,0.2);color:var(--text);padding:18px 16px;border-radius:var(--radius);font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:10px;justify-content:center;font-family:inherit;}
  .lang-btn:hover{border-color:var(--accent);background:var(--bg-hover);}
  .lang-flag{font-size:1.5rem;}

  #screen-title{align-items:center;justify-content:center;text-align:center;gap:24px;min-height:80vh;}
  #screen-title h1{font-size:2.2rem;font-weight:800;line-height:1.2;}
  #screen-title h1 span{color:var(--accent);}
  #screen-title .subtitle{color:var(--text-dim);font-size:1.05rem;max-width:500px;line-height:1.6;}

  #screen-round-intro{align-items:center;justify-content:center;text-align:center;gap:20px;min-height:60vh;}
  #screen-round-intro .round-num{color:var(--accent);font-size:0.9rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;}
  #screen-round-intro h2{font-size:1.8rem;font-weight:800;}
  #screen-round-intro .round-desc{color:var(--text-dim);font-size:1.05rem;max-width:500px;line-height:1.6;}
  .concept-badge{display:inline-block;background:rgba(99,102,241,0.15);color:var(--accent);padding:6px 16px;border-radius:99px;font-size:0.85rem;font-weight:600;}

  .game-header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.08);}
  .game-header .round-label{color:var(--text-dim);font-size:0.9rem;}
  .game-header .round-title{font-weight:700;font-size:1rem;}
  .game-header .score{font-size:1.1rem;font-weight:700;color:var(--accent);}

  .instruction{color:var(--text-dim);font-size:0.9rem;margin-bottom:12px;text-align:center;}
  .focus-prompt{text-align:center;margin-bottom:16px;font-size:1rem;line-height:1.6;}
  .focus-prompt .focus-word{color:var(--accent);font-weight:700;font-size:1.1rem;border-bottom:2px solid var(--accent);padding-bottom:2px;}

  /* Sentence with tappable words */
  .sentence-area{
    background:var(--bg-card);border-radius:var(--radius);padding:24px 20px;
    margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px 6px;
    justify-content:center;align-items:center;
  }
  .word-btn{
    padding:10px 14px;border-radius:8px;font-size:1.1rem;font-weight:600;
    background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);
    color:var(--text);cursor:pointer;transition:all 0.15s;
    -webkit-tap-highlight-color:transparent;min-width:44px;text-align:center;
    font-family:inherit;
  }
  .word-btn:hover{border-color:rgba(99,102,241,0.4);background:rgba(99,102,241,0.08);}
  .word-btn.selected{border-color:var(--accent);background:rgba(99,102,241,0.2);color:#fff;}
  .word-btn.focus{border-color:var(--accent);background:var(--accent);color:#fff;cursor:default;box-shadow:0 0 16px rgba(99,102,241,0.4);}
  .word-btn.revealed{cursor:default;transition:all 0.4s;}
  .word-btn .attn-bar{display:none;height:3px;border-radius:2px;margin-top:6px;background:var(--accent);transition:width 0.6s ease-out;}
  .word-btn.revealed .attn-bar{display:block;}

  /* Result markers on words */
  .word-btn.hit{border-color:var(--green);background:var(--green-bg);}
  .word-btn.miss{border-color:var(--amber);background:var(--amber-bg);}
  .word-btn.wrong{border-color:var(--red);background:var(--red-bg);}

  .btn-row{display:flex;justify-content:center;gap:12px;padding:8px 0 12px;flex-wrap:wrap;}

  .explanation-area{
    background:rgba(99,102,241,0.08);border-left:3px solid var(--accent);
    border-radius:0 var(--radius) var(--radius) 0;
    padding:16px 20px;margin-bottom:12px;font-size:0.95rem;line-height:1.6;
    opacity:0;transform:translateY(8px);transition:all 0.4s;
  }
  .explanation-area.visible{opacity:1;transform:translateY(0);}
  .explanation-area .label{font-weight:700;color:var(--accent);margin-bottom:4px;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em;}

  .score-pill{display:inline-block;padding:6px 16px;border-radius:99px;font-weight:700;font-size:0.9rem;}
  .score-pill.good{background:var(--green-bg);color:var(--green);}
  .score-pill.ok{background:var(--amber-bg);color:var(--amber);}
  .score-pill.bad{background:var(--red-bg);color:var(--red);}

  .progress-area{margin-top:auto;padding-top:12px;}
  .progress-bar-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease-out;}
  .progress-label{text-align:center;font-size:0.8rem;color:var(--text-dim);margin-top:6px;}

  #screen-round-summary,#screen-complete{align-items:center;justify-content:center;text-align:center;gap:20px;min-height:60vh;}
  .summary-score{font-size:2.5rem;font-weight:800;color:var(--accent);}
  .summary-breakdown{color:var(--text-dim);font-size:0.95rem;}
  .takeaway-box{background:var(--bg-card);border:1px solid rgba(99,102,241,0.2);border-radius:var(--radius);padding:20px 24px;max-width:500px;text-align:left;line-height:1.6;}
  .takeaway-box .takeaway-label{font-weight:700;color:var(--accent);font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
  .final-score{font-size:3rem;font-weight:800;color:var(--accent);}
  .final-title{font-size:1.3rem;font-weight:700;padding:8px 24px;border-radius:99px;background:rgba(99,102,241,0.15);color:var(--accent);}
  .concepts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;width:100%;text-align:left;}
  .concept-card{background:var(--bg-card);border-radius:var(--radius);padding:12px 16px;}
  .concept-card .cc-title{font-weight:700;font-size:0.85rem;margin-bottom:4px;}
  .concept-card .cc-desc{font-size:0.8rem;color:var(--text-dim);line-height:1.4;}

  .legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;font-size:0.8rem;color:var(--text-dim);margin-bottom:8px;}
  .legend span{display:flex;align-items:center;gap:4px;}
  .legend .dot{width:10px;height:10px;border-radius:3px;}

  @media(max-width:500px){
    #screen-title h1{font-size:1.7rem;}
    .word-btn{font-size:0.95rem;padding:8px 10px;min-width:40px;}
    .sentence-area{padding:16px 12px;gap:6px 4px;}
    .concepts-grid{grid-template-columns:1fr;}
    .lang-grid{grid-template-columns:1fr;max-width:240px;}
  }
</style>
</head>
<body>
<a href="../" class="back-link">&larr; All Games</a>

<div id="screen-title" class="screen active">
  <h1 id="title-heading"></h1>
  <p class="subtitle" id="title-subtitle"></p>
  <div class="lang-grid" id="lang-grid"></div>
</div>

<div id="screen-round-intro" class="screen">
  <span class="round-num" id="intro-round-num"></span>
  <h2 id="intro-title"></h2>
  <p class="round-desc" id="intro-desc"></p>
  <span class="concept-badge" id="intro-concept"></span>
  <button class="btn-primary" id="btn-begin" onclick="startRound()"></button>
</div>

<div id="screen-play" class="screen">
  <div class="game-header">
    <div><div class="round-label" id="play-round-label"></div><div class="round-title" id="play-round-title"></div></div>
    <span class="score" id="play-score">0</span>
  </div>
  <div class="focus-prompt" id="focus-prompt"></div>
  <div class="instruction" id="play-instruction"></div>
  <div class="sentence-area" id="sentence-area"></div>
  <div class="legend" id="legend" style="display:none">
    <span><span class="dot" style="background:var(--green)"></span> You picked &amp; high attention</span>
    <span><span class="dot" style="background:var(--amber)"></span> High attention (missed)</span>
    <span><span class="dot" style="background:var(--red)"></span> You picked &amp; low attention</span>
  </div>
  <div class="btn-row" id="submit-row">
    <button class="btn-primary" id="btn-submit" onclick="submitSelection()"></button>
  </div>
  <div class="btn-row" id="score-row" style="display:none"><span class="score-pill" id="round-points"></span></div>
  <div class="explanation-area" id="explanation-area">
    <div class="label" id="explanation-label"></div>
    <p id="explanation-text"></p>
  </div>
  <div class="btn-row" id="next-row" style="display:none">
    <button class="btn-primary" id="btn-next" onclick="nextChallenge()"></button>
  </div>
  <div class="progress-area">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label"></div>
  </div>
</div>

<div id="screen-round-summary" class="screen">
  <span class="round-num" id="summary-round-num"></span>
  <div class="summary-score" id="summary-score"></div>
  <div class="summary-breakdown" id="summary-breakdown"></div>
  <div class="takeaway-box"><div class="takeaway-label" id="summary-takeaway-label"></div><p id="summary-takeaway"></p></div>
  <button class="btn-primary" id="btn-next-round" onclick="nextRound()"></button>
</div>

<div id="screen-complete" class="screen">
  <h2 id="complete-heading"></h2>
  <div class="final-score" id="final-score"></div>
  <div class="final-title" id="final-title"></div>
  <p style="color:var(--text-dim);max-width:500px;line-height:1.6" id="final-desc"></p>
  <div class="concepts-grid" id="concepts-grid"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn-primary" id="btn-play-again" onclick="location.reload()"></button>
    <button class="btn-secondary" onclick="window.location.href='../'">&#8592; <span id="btn-all-games"></span></button>
  </div>
</div>

// ==================== STATE ====================
let lang='en',gameData=null;
const state={round:0,challenge:0,score:0,roundScore:0,roundGood:0,roundTotal:0,
  totalChallenges:0,completedChallenges:0,maxScore:0,selected:new Set()};
const $=id=>document.getElementById(id);
const show=id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');};
const t=()=>UI[lang];
function getCR(){return gameData.rounds[state.round];}
function getCC(){return getCR().challenges[state.challenge];}

function init(){
  const grid=$('lang-grid');grid.innerHTML='';
  [{code:'en',flag:'\ud83c\uddec\ud83c\udde7',label:'English'},{code:'de',flag:'\ud83c\udde9\ud83c\uddea',label:'Deutsch'},{code:'fr',flag:'\ud83c\uddeb\ud83c\uddf7',label:'Fran\u00e7ais'},{code:'it',flag:'\ud83c\uddee\ud83c\uddf9',label:'Italiano'}].forEach(l=>{
    const btn=document.createElement('button');btn.className='lang-btn';
    btn.innerHTML=`<span class="lang-flag">${l.flag}</span>${l.label}`;
    btn.addEventListener('click',()=>startWithLang(l.code));grid.appendChild(btn);
  });
  $('title-heading').innerHTML=UI.en.heading;$('title-subtitle').textContent=UI.en.subtitle;
}
function startWithLang(code){
  lang=code;document.documentElement.lang=code;gameData=G[code];
  state.round=0;state.score=0;state.completedChallenges=0;state.totalChallenges=0;state.maxScore=0;
  gameData.rounds.forEach(r=>{state.totalChallenges+=r.challenges.length;r.challenges.forEach(()=>state.maxScore+=100);});
  showRoundIntro();
}
function showRoundIntro(){
  const r=getCR();
  $('intro-round-num').textContent=t().roundN(state.round+1,gameData.rounds.length);
  $('intro-title').textContent=r.title;$('intro-desc').textContent=r.description;
  $('intro-concept').textContent=r.concept;$('btn-begin').textContent=t().begin;
  show('screen-round-intro');
}
function startRound(){
  state.challenge=0;state.roundScore=0;state.roundGood=0;state.roundTotal=0;
  show('screen-play');showChallenge();
}
function showChallenge(){
  const r=getCR(),ch=getCC();
  $('play-round-label').textContent=t().roundN(state.round+1,gameData.rounds.length);
  $('play-round-title').textContent=r.title;$('play-score').textContent=state.score;
  $('play-instruction').textContent=t().instruction;
  $('focus-prompt').innerHTML=t().focusPrompt(ch.words[ch.focusIdx]);
  $('btn-submit').textContent=t().submit;$('explanation-label').textContent=t().howItWorks;
  $('submit-row').style.display='flex';$('score-row').style.display='none';
  $('explanation-area').classList.remove('visible');$('next-row').style.display='none';
  $('legend').style.display='none';
  state.selected=new Set();

  const area=$('sentence-area');area.innerHTML='';
  ch.words.forEach((w,i)=>{
    const btn=document.createElement('button');
    btn.className='word-btn'+(i===ch.focusIdx?' focus':'');
    btn.innerHTML=w+'<div class="attn-bar"></div>';
    btn.dataset.idx=i;
    if(i!==ch.focusIdx) btn.addEventListener('click',()=>toggleWord(btn,i));
    area.appendChild(btn);
  });
  updateProgress();
}
function toggleWord(btn,idx){
  if(state.selected.has(idx)){state.selected.delete(idx);btn.classList.remove('selected');}
  else{state.selected.add(idx);btn.classList.add('selected');}
}
function submitSelection(){
  if(state.selected.size===0)return;
  const ch=getCC();
  $('submit-row').style.display='none';

  // Reveal attention weights on all words
  const btns=$('sentence-area').querySelectorAll('.word-btn');
  const topSet=new Set(ch.top);
  let hits=0;
  btns.forEach((btn,i)=>{
    if(i===ch.focusIdx)return;
    btn.classList.add('revealed');
    const bar=btn.querySelector('.attn-bar');
    const w=ch.attn[i];
    setTimeout(()=>{bar.style.width=Math.max(w*100*2.5,4)+'%';},i*60);
    const isTop=topSet.has(i), picked=state.selected.has(i);
    if(picked&&isTop){btn.classList.add('hit');hits++;}
    else if(!picked&&isTop){btn.classList.add('miss');}
    else if(picked&&!isTop){btn.classList.add('wrong');}
  });

  const points=Math.round((hits/ch.top.length)*100);
  state.score+=points;state.roundScore+=points;state.roundTotal++;
  if(hits>=2)state.roundGood++;

  const q=points>=80?'good':points>=40?'ok':'bad';
  $('score-row').style.display='flex';
  $('round-points').className='score-pill '+q;$('round-points').textContent='+'+points;
  $('play-score').textContent=state.score;
  $('legend').style.display='flex';
  $('explanation-text').textContent=ch.explanation;
  $('explanation-area').classList.add('visible');
  $('next-row').style.display='flex';$('btn-next').textContent=t().continue_;
}
function nextChallenge(){
  state.completedChallenges++;
  if(state.challenge+1<getCR().challenges.length){state.challenge++;showChallenge();return;}
  showRoundSummary();
}
function showRoundSummary(){
  const r=getCR();
  $('summary-round-num').textContent=t().roundComplete(state.round+1);
  $('summary-score').textContent='+'+state.roundScore;
  $('summary-breakdown').textContent=t().breakdown(state.roundGood,state.roundTotal,state.score);
  $('summary-takeaway-label').textContent=t().keyTakeaway;$('summary-takeaway').textContent=r.takeaway;
  $('btn-next-round').textContent=state.round+1>=gameData.rounds.length?t().seeResults:t().nextRound;
  show('screen-round-summary');
}
function nextRound(){
  if(state.round+1>=gameData.rounds.length){showComplete();return;}
  state.round++;state.challenge=0;showRoundIntro();
}
function showComplete(){
  const pct=state.score/state.maxScore;
  const idx=pct>=.9?4:pct>=.75?3:pct>=.5?2:pct>=.25?1:0;
  $('complete-heading').textContent=t().gameComplete;$('final-score').textContent=state.score;
  $('final-title').textContent=t().titles[idx];$('final-desc').textContent=t().titleDescs[idx];
  $('btn-play-again').textContent=t().playAgain;$('btn-all-games').textContent=t().allGames;
  const grid=$('concepts-grid');grid.innerHTML='';
  t().concepts.forEach(([ti,de])=>{const c=document.createElement('div');c.className='concept-card';
    c.innerHTML=`<div class="cc-title">${ti}</div><div class="cc-desc">${de}</div>`;grid.appendChild(c);});
  show('screen-complete');
}
function updateProgress(){
  $('progress-fill').style.width=(state.completedChallenges/state.totalChallenges)*100+'%';
  $('progress-label').textContent=t().stepN(state.completedChallenges+1,state.totalChallenges);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' '){e.preventDefault();
    if($('next-row').style.display!=='none'){$('btn-next').click();return;}
    const a=document.querySelector('.screen.active');if(a){const b=a.querySelector('.btn-primary');if(b)b.click();}
  }
});

const urlLang=new URLSearchParams(window.location.search).get('lang');
if(urlLang&&G[urlLang]){init();startWithLang(urlLang);}else{init();}
</script>
