<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Learning Games</title>
<style>
  :root {
    --bg: #0f1729;
    --bg-card: #1a2340;
    --bg-hover: #243056;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent: #6366f1;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 24px 16px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 48px; padding-top: 32px; }
  header h1 { font-size: 2.6rem; font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
  header h1 span { color: var(--accent); }
  header p { color: var(--text-dim); font-size: 1.1rem; max-width: 520px; margin: 0 auto; line-height: 1.6; }
  .badge {
    display: inline-block; background: rgba(99,102,241,0.15); color: var(--accent);
    font-size: 0.8rem; font-weight: 700; padding: 4px 12px; border-radius: 99px;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px;
  }

  /* Language picker */
  .lang-bar {
    display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap;
  }
  .lang-btn {
    background: var(--bg-card); border: 2px solid rgba(99,102,241,0.15); color: var(--text-dim);
    padding: 8px 16px; border-radius: 99px; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  .lang-btn:hover { border-color: rgba(99,102,241,0.4); color: var(--text); }
  .lang-btn.active { border-color: var(--accent); color: var(--text); background: rgba(99,102,241,0.1); }
  .lang-flag { font-size: 1.1rem; }

  .games-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
  .game-card {
    background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius); padding: 28px 28px 24px;
    text-decoration: none; color: var(--text); display: block;
    transition: all 0.25s; position: relative; overflow: hidden;
  }
  .game-card:hover {
    border-color: rgba(99,102,241,0.4); transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(99,102,241,0.12);
  }
  .game-card .card-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
  .game-icon {
    font-size: 2.2rem; line-height: 1; flex-shrink: 0;
    width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
    background: rgba(99,102,241,0.1); border-radius: 12px;
  }
  .game-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
  .game-card .concept-tag { font-size: 0.8rem; color: var(--accent); font-weight: 600; }
  .game-card p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; }
  .game-card .play-hint {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; font-size: 0.9rem; font-weight: 600; color: var(--accent);
  }
  .game-card .play-hint .arrow { transition: transform 0.2s; }
  .game-card:hover .play-hint .arrow { transform: translateX(4px); }
  .game-card.coming-soon { opacity: 0.5; pointer-events: none; }
  .game-card.coming-soon .play-hint { color: var(--text-dim); }

  .section-label {
    font-size: 0.85rem; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; margin-top: 12px;
  }
  footer {
    text-align: center; margin-top: 64px; padding: 24px 0;
    border-top: 1px solid rgba(255,255,255,0.06); color: var(--text-dim);
    font-size: 0.85rem; line-height: 1.6;
  }
  @media (max-width: 500px) {
    header h1 { font-size: 1.8rem; }
    .game-card { padding: 20px; }
    .game-card h2 { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge" id="badge"></div>
    <h1 id="heading"></h1>
    <p id="subtitle"></p>
    <div class="lang-bar" id="lang-bar"></div>
  </header>

  <div class="section-label" id="section-label"></div>
  <div class="games-grid" id="games-grid"></div>

  <footer id="footer"></footer>
</div>

      { href:'guess-the-token/', icon:'\ud83c\udfaf', title:'Errate das n\u00e4chste Token', tags:'Token-Vorhersage \u00b7 Wahrscheinlichkeiten \u00b7 Temperatur', desc:'Schl\u00fcpfe in die Rolle eines LLM und sage vorher, was als N\u00e4chstes kommt. Sieh Wahrscheinlichkeitsverteilungen und entdecke, wie Kreativit\u00e4t aus Zufall entsteht.', active:true },
      { href:'the-tokenizer/', icon:'\u2702\ufe0f', title:'Der Tokenizer', tags:'Tokenisierung \u00b7 BPE \u00b7 Subwort-Aufteilung', desc:'Wo teilt die KI Text in Token auf? Klicke, um deine Vermutungen zu platzieren, dann sieh die echte Tokenisierung. Von einfachen W\u00f6rtern bis zu Emoji und Code.', active:true },
      { href:'#', icon:'\ud83d\udccd', title:'Wort-Raum-Entdecker', tags:'Embeddings \u00b7 \u00c4hnlichkeit \u00b7 Vektorarithmetik', desc:'Ziehe W\u00f6rter auf eine 2D-Karte, wo Abstand \u00c4hnlichkeit bedeutet. Entdecke, wie LLMs Bedeutung repr\u00e4sentieren.', active:false },

  it: {

    playNow: 'Gioca ora',
    comingSoon: 'In arrivo',
    footer: 'Scopri come funzionano i grandi modelli linguistici attraverso giochi interattivi.<br>Nessuna formazione in data science necessaria.',
    games: [
      { href:'guess-the-token/', icon:'\ud83c\udfaf', title:'Indovina il prossimo token', tags:'Previsione \u00b7 Probabilit\u00e0 \u00b7 Temperatura', desc:'Mettiti nei panni di un LLM e prevedi cosa viene dopo. Scopri le distribuzioni di probabilit\u00e0 e come la creativit\u00e0 emerge dalla casualit\u00e0.', active:true },
      { href:'the-tokenizer/', icon:'\u2702\ufe0f', title:'Il Tokenizzatore', tags:'Tokenizzazione \u00b7 BPE \u00b7 Sotto-parole', desc:'Dove pensi che l\u2019IA divida il testo in token? Clicca per posizionare le tue divisioni, poi scopri la vera tokenizzazione.', active:true },
      { href:'#', icon:'\ud83d\udccd', title:'Esploratore dello spazio parole', tags:'Embeddings \u00b7 Similarit\u00e0 \u00b7 Aritmetica vettoriale', desc:'Trascina parole su una mappa 2D dove la distanza significa similarit\u00e0. Scopri come gli LLM rappresentano il significato.', active:false },

      { href:'#', icon:'\ud83d\udd0d', title:'Trova l\u2019allucinazione', tags:'Allucinazione \u00b7 Verifica \u00b7 Confidenza', desc:'Leggi paragrafi generati dall\u2019IA e trova i fatti inventati.', active:false },
    ]
  }
};

let currentLang = localStorage.getItem('llmgames-lang') || 'en';

function setLang(code) {
  currentLang = code;
  localStorage.setItem('llmgames-lang', code);
  document.documentElement.lang = code;
  render();
}

function render() {
  const tr = T[currentLang];

  // Lang bar
  const bar = document.getElementById('lang-bar');
  bar.innerHTML = '';
  LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (l.code === currentLang ? ' active' : '');
    btn.innerHTML = `<span class="lang-flag">${l.flag}</span>${l.label}`;
    btn.addEventListener('click', () => setLang(l.code));
    bar.appendChild(btn);
  });

  // Header
  document.getElementById('badge').textContent = tr.badge;
  document.getElementById('heading').innerHTML = tr.heading;
  document.getElementById('subtitle').textContent = tr.subtitle;
  document.getElementById('section-label').textContent = tr.section;
  document.getElementById('footer').innerHTML = tr.footer;

  // Games
  const grid = document.getElementById('games-grid');
  grid.innerHTML = '';
  tr.games.forEach(g => {
    const href = g.active ? g.href + '?lang=' + currentLang : '#';
    const a = document.createElement('a');
    a.href = href;
    a.className = 'game-card' + (g.active ? '' : ' coming-soon');
    a.innerHTML = `
      <div class="card-top">
        <div class="game-icon">${g.icon}</div>
        <div>
          <h2>${g.title}</h2>
          <span class="concept-tag">${g.tags}</span>
        </div>
      </div>
      <p>${g.desc}</p>
      <span class="play-hint">${g.active ? tr.playNow : tr.comingSoon} ${g.active ? '<span class="arrow">&rarr;</span>' : ''}</span>
    `;
    grid.appendChild(a);
  });
}

render();
</script>
</body>
</html>
