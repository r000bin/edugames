<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Space Explorer</title>
<style>
  :root {
    --bg: #0f1729;
    --bg-card: #1a2340;
    --bg-hover: #243056;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent: #6366f1;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.15);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.15);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.15);
    --radius: 10px;
    --max-w: 720px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; justify-content: center; padding: 16px;
    overflow-x: hidden;
  }
  .screen { display:none; flex-direction:column; width:100%; max-width:var(--max-w); }
  .screen.active { display:flex; }
  button { font-family:inherit; cursor:pointer; border:none; border-radius:var(--radius); font-size:1rem; transition:all 0.2s; }
  button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .btn-primary { background:var(--accent); color:#fff; padding:14px 32px; font-size:1.1rem; font-weight:600; }
  .btn-primary:hover { filter:brightness(1.15); transform:translateY(-1px); }
  .btn-secondary { background:var(--bg-card); color:var(--text); padding:12px 24px; border:1px solid rgba(255,255,255,0.1); font-weight:600; }
  .btn-secondary:hover { background:var(--bg-hover); }
  .back-link { color:var(--text-dim); text-decoration:none; font-size:0.9rem; position:fixed; top:16px; left:16px; z-index:10; }
  .back-link:hover { color:var(--text); }

  .lang-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:360px; }
  .lang-btn { background:var(--bg-card); border:2px solid rgba(99,102,241,0.2); color:var(--text); padding:18px 16px; border-radius:var(--radius); font-size:1.1rem; font-weight:600; display:flex; align-items:center; gap:10px; justify-content:center; font-family:inherit; }
  .lang-btn:hover { border-color:var(--accent); background:var(--bg-hover); }
  .lang-flag { font-size:1.5rem; }

  /* Title */
  #screen-title { align-items:center; justify-content:center; text-align:center; gap:24px; min-height:80vh; }
  #screen-title h1 { font-size:2.2rem; font-weight:800; line-height:1.2; }
  #screen-title h1 span { color:var(--accent); }
  #screen-title .subtitle { color:var(--text-dim); font-size:1.05rem; max-width:500px; line-height:1.6; }

  /* Round intro */
  #screen-round-intro { align-items:center; justify-content:center; text-align:center; gap:20px; min-height:60vh; }
  #screen-round-intro .round-num { color:var(--accent); font-size:0.9rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; }
  #screen-round-intro h2 { font-size:1.8rem; font-weight:800; }
  #screen-round-intro .round-desc { color:var(--text-dim); font-size:1.05rem; max-width:500px; line-height:1.6; }
  .concept-badge { display:inline-block; background:rgba(99,102,241,0.15); color:var(--accent); padding:6px 16px; border-radius:99px; font-size:0.85rem; font-weight:600; }

  /* Header */
  .game-header { display:flex; justify-content:space-between; align-items:center; padding:12px 0; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .game-header .round-label { color:var(--text-dim); font-size:0.9rem; }
  .game-header .round-title { font-weight:700; font-size:1rem; }
  .game-header .score { font-size:1.1rem; font-weight:700; color:var(--accent); }

  /* Instruction */
  .instruction { color:var(--text-dim); font-size:0.9rem; margin-bottom:8px; text-align:center; }

  /* Word tray */
  .word-tray {
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
    padding:12px; margin-bottom:12px; min-height:48px;
    background:var(--bg-card); border-radius:var(--radius);
    border:2px dashed rgba(255,255,255,0.08);
  }
  .word-chip {
    padding:8px 16px; border-radius:8px; font-weight:600; font-size:0.95rem;
    cursor:grab; user-select:none; transition:all 0.15s;
    background:var(--accent); color:#fff;
    touch-action:none;
  }
  .word-chip:hover { filter:brightness(1.15); transform:scale(1.05); }
  .word-chip.dragging { opacity:0.5; }
  .word-chip.placed { background:rgba(99,102,241,0.3); cursor:grab; }

  /* Canvas area */
  .canvas-wrap {
    position:relative; width:100%; aspect-ratio:4/3;
    background:var(--bg-card); border-radius:var(--radius); overflow:hidden;
    margin-bottom:12px; border:1px solid rgba(255,255,255,0.06);
    touch-action:none;
  }
  .canvas-wrap canvas { width:100%; height:100%; display:block; }
  .anchor-label {
    position:absolute; color:var(--text); font-size:0.8rem; font-weight:700;
    pointer-events:none; white-space:nowrap; text-shadow:0 1px 4px rgba(0,0,0,0.8);
    transform:translate(-50%,-150%);
  }
  .placed-label {
    position:absolute; font-size:0.8rem; font-weight:600;
    pointer-events:none; white-space:nowrap; padding:3px 8px;
    border-radius:4px; background:rgba(99,102,241,0.8); color:#fff;
    transform:translate(-50%,-150%); z-index:2;
  }
  .result-label {
    position:absolute; font-size:0.8rem; font-weight:600;
    pointer-events:none; white-space:nowrap; padding:3px 8px;
    border-radius:4px; transform:translate(-50%,-150%); z-index:2;
  }
  .result-label.good { background:rgba(34,197,94,0.8); color:#fff; }
  .result-label.ok { background:rgba(245,158,11,0.8); color:#000; }
  .result-label.bad { background:rgba(239,68,68,0.8); color:#fff; }

  /* Buttons */
  .btn-row { display:flex; justify-content:center; gap:12px; padding:8px 0 12px; flex-wrap:wrap; }

  /* Explanation */
  .explanation-area {
    background:rgba(99,102,241,0.08); border-left:3px solid var(--accent);
    border-radius:0 var(--radius) var(--radius) 0;
    padding:16px 20px; margin-bottom:12px; font-size:0.95rem; line-height:1.6;
    opacity:0; transform:translateY(8px); transition:all 0.4s;
  }
  .explanation-area.visible { opacity:1; transform:translateY(0); }
  .explanation-area .label { font-weight:700; color:var(--accent); margin-bottom:4px; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; }

  .score-pill { display:inline-block; padding:6px 16px; border-radius:99px; font-weight:700; font-size:0.9rem; }
  .score-pill.good { background:var(--green-bg); color:var(--green); }
  .score-pill.ok { background:var(--amber-bg); color:var(--amber); }
  .score-pill.bad { background:var(--red-bg); color:var(--red); }

  /* Progress */
  .progress-area { margin-top:auto; padding-top:12px; }
  .progress-bar-bg { height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.4s ease-out; }
  .progress-label { text-align:center; font-size:0.8rem; color:var(--text-dim); margin-top:6px; }

  /* Summary / Complete */
  #screen-round-summary,#screen-complete { align-items:center; justify-content:center; text-align:center; gap:20px; min-height:60vh; }
  .summary-score { font-size:2.5rem; font-weight:800; color:var(--accent); }
  .summary-breakdown { color:var(--text-dim); font-size:0.95rem; }
  .takeaway-box { background:var(--bg-card); border:1px solid rgba(99,102,241,0.2); border-radius:var(--radius); padding:20px 24px; max-width:500px; text-align:left; line-height:1.6; }
  .takeaway-box .takeaway-label { font-weight:700; color:var(--accent); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
  .final-score { font-size:3rem; font-weight:800; color:var(--accent); }
  .final-title { font-size:1.3rem; font-weight:700; padding:8px 24px; border-radius:99px; background:rgba(99,102,241,0.15); color:var(--accent); }
  .concepts-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:500px; width:100%; text-align:left; }
  .concept-card { background:var(--bg-card); border-radius:var(--radius); padding:12px 16px; }
  .concept-card .cc-title { font-weight:700; font-size:0.85rem; margin-bottom:4px; }
  .concept-card .cc-desc { font-size:0.8rem; color:var(--text-dim); line-height:1.4; }

  @media (max-width:500px) {
    #screen-title h1 { font-size:1.7rem; }
    .canvas-wrap { aspect-ratio:1/1; }
    .word-chip { font-size:0.85rem; padding:6px 12px; }
    .concepts-grid { grid-template-columns:1fr; }
    .lang-grid { grid-template-columns:1fr; max-width:240px; }
  }
</style>
</head>

<a href="../" class="back-link">&larr; All Games</a>

<div id="screen-round-summary" class="screen">

  <button class="btn-primary" id="btn-next-round" onclick="nextRound()"></button>
</div>

<div id="screen-complete" class="screen">
  <h2 id="complete-heading"></h2>
  <div class="final-score" id="final-score"></div>
  <div class="final-title" id="final-title"></div>
  <p style="color:var(--text-dim);max-width:500px;line-height:1.6" id="final-desc"></p>
  <div class="concepts-grid" id="concepts-grid"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">

    <button class="btn-secondary" onclick="window.location.href='../'">&#8592; <span id="btn-all-games"></span></button>
  </div>
</div>

      words:[{w:"t\u00e8",x:.25,y:.3},{w:"vino",x:.75,y:.3},{w:"succo",x:.4,y:.6},{w:"espresso",x:.2,y:.25},{w:"latte",x:.45,y:.55}],
      explanation:"Bevande calde (caff\u00e8, t\u00e8, espresso) insieme. Alcolici (birra, vino) insieme. Bevande neutre (acqua, succo, latte) nel mezzo."
    }]
  }

};

// ==================== STATE ====================
let lang='en', gameData=null;
const state = {
  round:0, challenge:0, score:0,
  roundScore:0, roundClose:0, roundTotal:0,
  totalChallenges:0, completedChallenges:0, maxScore:0,
  placements:{}, dragging:null, dragOffX:0, dragOffY:0,
};
const $=id=>document.getElementById(id);
const show=id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');};
const t=()=>UI[lang];
function getCR(){return gameData.rounds[state.round];}
function getCC(){return getCR().challenges[state.challenge];}

// ==================== CANVAS ====================
let canvasW=0, canvasH=0;
function resizeCanvas(){
  const wrap=$('canvas-wrap');
  const c=$('canvas');
  const r=wrap.getBoundingClientRect();
  canvasW=r.width; canvasH=r.height;
  c.width=canvasW*devicePixelRatio;
  c.height=canvasH*devicePixelRatio;
  c.style.width=canvasW+'px';
  c.style.height=canvasH+'px';
}
function drawGrid(){
  resizeCanvas();
  const c=$('canvas'), ctx=c.getContext('2d');
  ctx.scale(devicePixelRatio,devicePixelRatio);
  ctx.clearRect(0,0,canvasW,canvasH);
  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=1;
  for(let i=0;i<=10;i++){
    const x=canvasW*i/10, y=canvasH*i/10;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvasH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvasW,y);ctx.stroke();
  }
}
function drawAnchors(ch){
  const wrap=$('canvas-wrap');
  wrap.querySelectorAll('.anchor-label,.placed-label,.result-label').forEach(e=>e.remove());
  ch.anchors.forEach(a=>{
    const c=$('canvas'),ctx=c.getContext('2d');
    const px=a.x*canvasW, py=a.y*canvasH;
    ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
    ctx.restore();
    const lbl=document.createElement('div');
    lbl.className='anchor-label';
    lbl.textContent=a.w;
    lbl.style.left=px+'px'; lbl.style.top=py+'px';
    wrap.appendChild(lbl);
  });
}
function drawPlacement(word, px, py){
  const wrap=$('canvas-wrap');
  // Remove old label for this word
  wrap.querySelectorAll('.placed-label').forEach(l=>{if(l.dataset.word===word)l.remove();});
  const lbl=document.createElement('div');
  lbl.className='placed-label'; lbl.dataset.word=word;
  lbl.textContent=word;
  lbl.style.left=px+'px'; lbl.style.top=py+'px';
  wrap.appendChild(lbl);
  // Draw dot on canvas
  redrawCanvas();
}
function redrawCanvas(){
  drawGrid();
  const ch=getCC();
  // Draw anchors
  const c=$('canvas'),ctx=c.getContext('2d');
  ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);
  ch.anchors.forEach(a=>{
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath();ctx.arc(a.x*canvasW,a.y*canvasH,6,0,Math.PI*2);ctx.fill();
  });
  // Draw placed words
  Object.entries(state.placements).forEach(([w,pos])=>{
    ctx.fillStyle='rgba(99,102,241,0.8)';
    ctx.beginPath();ctx.arc(pos.px,pos.py,5,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

// ==================== INIT ====================
function init(){
  const grid=$('lang-grid');grid.innerHTML='';
  [{code:'en',flag:'\ud83c\uddec\ud83c\udde7',label:'English'},{code:'de',flag:'\ud83c\udde9\ud83c\uddea',label:'Deutsch'},{code:'fr',flag:'\ud83c\uddeb\ud83c\uddf7',label:'Fran\u00e7ais'},{code:'it',flag:'\ud83c\uddee\ud83c\uddf9',label:'Italiano'}].forEach(l=>{
    const btn=document.createElement('button');btn.className='lang-btn';
    btn.innerHTML=`<span class="lang-flag">${l.flag}</span>${l.label}`;
    btn.addEventListener('click',()=>startWithLang(l.code));
    grid.appendChild(btn);
  });
  $('title-heading').innerHTML=UI.en.heading;
  $('title-subtitle').textContent=UI.en.subtitle;
}
function startWithLang(code){
  lang=code; document.documentElement.lang=code;
  gameData=GAME_DATA_ALL[code];
  state.round=0;state.score=0;state.completedChallenges=0;
  state.totalChallenges=0;state.maxScore=0;
  gameData.rounds.forEach(r=>{state.totalChallenges+=r.challenges.length;r.challenges.forEach(()=>state.maxScore+=100);});
  showRoundIntro();
}

// ==================== GAME FLOW ====================
function showRoundIntro(){
  const r=getCR();
  $('intro-round-num').textContent=t().roundN(state.round+1,gameData.rounds.length);
  $('intro-title').textContent=r.title;
  $('intro-desc').textContent=r.description;
  $('intro-concept').textContent=r.concept;
  $('btn-begin').textContent=t().begin;
  show('screen-round-intro');
}
function startRound(){
  state.challenge=0;state.roundScore=0;state.roundClose=0;state.roundTotal=0;
  show('screen-play');
  showChallenge();
}
function showChallenge(){
  const r=getCR(), ch=getCC();
  $('play-round-label').textContent=t().roundN(state.round+1,gameData.rounds.length);
  $('play-round-title').textContent=r.title;
  $('play-score').textContent=state.score;
  $('play-instruction').textContent=t().instruction;
  $('btn-submit').textContent=t().submit;
  $('btn-reset').textContent=t().reset;
  $('explanation-label').textContent=t().howItWorks;
  $('submit-row').style.display='flex';
  $('continue-row').style.display='none';
  $('explanation-area').classList.remove('visible');
  $('next-row').style.display='none';
  state.placements={};

  // Build word tray
  const tray=$('word-tray'); tray.innerHTML='';
  const shuffled=[...ch.words];
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  shuffled.forEach(w=>{
    const chip=document.createElement('div');chip.className='word-chip';chip.textContent=w.w;
    chip.dataset.word=w.w;
    // Drag support
    chip.addEventListener('pointerdown',e=>startDrag(e,w.w,chip));
    tray.appendChild(chip);
  });

  // Draw canvas
  setTimeout(()=>{
    drawGrid();
    drawAnchors(ch);
    // Re-add anchor labels
    const wrap=$('canvas-wrap');
    wrap.querySelectorAll('.anchor-label,.placed-label,.result-label').forEach(e=>e.remove());
    ch.anchors.forEach(a=>{
      const lbl=document.createElement('div');lbl.className='anchor-label';
      lbl.textContent=a.w;lbl.style.left=(a.x*canvasW)+'px';lbl.style.top=(a.y*canvasH)+'px';
      wrap.appendChild(lbl);
    });
  },50);
  updateProgress();
}

// ==================== DRAG & DROP ====================
function startDrag(e,word,chip){
  e.preventDefault();
  state.dragging=word;
  chip.classList.add('dragging');
  chip.setPointerCapture(e.pointerId);

  const onMove=ev=>{
    const wrap=$('canvas-wrap');
    const rect=wrap.getBoundingClientRect();
    const px=ev.clientX-rect.left, py=ev.clientY-rect.top;
    if(px>=0&&px<=canvasW&&py>=0&&py<=canvasH){
      state.placements[word]={px,py};
      drawPlacement(word,px,py);
      chip.classList.add('placed');
    }
  };
  const onUp=ev=>{
    chip.classList.remove('dragging');
    chip.removeEventListener('pointermove',onMove);
    chip.removeEventListener('pointerup',onUp);
    state.dragging=null;
  };
  chip.addEventListener('pointermove',onMove);
  chip.addEventListener('pointerup',onUp);
}

function resetPlacements(){
  state.placements={};
  $('canvas-wrap').querySelectorAll('.placed-label,.result-label').forEach(e=>e.remove());
  $('word-tray').querySelectorAll('.word-chip').forEach(c=>c.classList.remove('placed'));
  redrawCanvas();
  const ch=getCC();
  ch.anchors.forEach(a=>{
    const lbl=document.createElement('div');lbl.className='anchor-label';
    lbl.textContent=a.w;lbl.style.left=(a.x*canvasW)+'px';lbl.style.top=(a.y*canvasH)+'px';
    $('canvas-wrap').appendChild(lbl);
  });
}

function submitPlacements(){
  const ch=getCC();
  // Check all words placed
  const unplaced=ch.words.filter(w=>!state.placements[w.w]);
  if(unplaced.length>0){
    // Flash tray
    $('word-tray').style.borderColor='var(--amber)';
    setTimeout(()=>$('word-tray').style.borderColor='',600);
    return;
  }

  $('submit-row').style.display='none';

  // Score each word
  let totalDist=0, closeCount=0;
  const wrap=$('canvas-wrap');
  wrap.querySelectorAll('.placed-label').forEach(e=>e.remove());

  ch.words.forEach(w=>{
    const actual={px:w.x*canvasW, py:w.y*canvasH};
    const placed=state.placements[w.w];
    const dist=Math.sqrt((actual.px-placed.px)**2+(actual.py-placed.py)**2);
    const maxDist=Math.sqrt(canvasW**2+canvasH**2);
    const normDist=dist/maxDist;
    totalDist+=normDist;

    const isClose=normDist<0.12;
    const isOk=normDist<0.25;
    if(isClose)closeCount++;

    // Draw line from placed to actual
    const c=$('canvas'),ctx=c.getContext('2d');
    ctx.save();ctx.scale(devicePixelRatio,devicePixelRatio);
    ctx.strokeStyle=isClose?'rgba(34,197,94,0.5)':isOk?'rgba(245,158,11,0.5)':'rgba(239,68,68,0.4)';
    ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(placed.px,placed.py);ctx.lineTo(actual.px,actual.py);ctx.stroke();
    // Actual position dot
    ctx.fillStyle=isClose?'var(--green)':isOk?'var(--amber)':'var(--red)';
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(actual.px,actual.py,5,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Label at actual position
    const lbl=document.createElement('div');
    lbl.className='result-label '+(isClose?'good':isOk?'ok':'bad');
    lbl.textContent=w.w;
    lbl.style.left=actual.px+'px';lbl.style.top=actual.py+'px';
    wrap.appendChild(lbl);
  });

  const avgDist=totalDist/ch.words.length;
  const points=Math.round(Math.max(0,(1-avgDist*2.5))*100);
  state.score+=points;state.roundScore+=points;state.roundClose+=closeCount;state.roundTotal++;

  const quality=points>=80?'good':points>=40?'ok':'bad';
  $('continue-row').style.display='flex';
  $('round-points').className='score-pill '+quality;
  $('round-points').textContent=`+${points}`;
  $('play-score').textContent=state.score;

  $('explanation-text').textContent=ch.explanation;
  $('explanation-area').classList.add('visible');
  $('next-row').style.display='flex';
  $('btn-next').textContent=t().continue_;
}

function nextChallenge(){
  state.completedChallenges++;
  const r=getCR();
  if(state.challenge+1<r.challenges.length){state.challenge++;showChallenge();return;}
  showRoundSummary();
}
function showRoundSummary(){
  const r=getCR();
  $('summary-round-num').textContent=t().roundComplete(state.round+1);
  $('summary-score').textContent=`+${state.roundScore}`;
  $('summary-breakdown').textContent=t().breakdown(state.roundClose,state.roundTotal*getCC()?.words?.length||0,state.score);
  $('summary-takeaway-label').textContent=t().keyTakeaway;
  $('summary-takeaway').textContent=r.takeaway;
  $('btn-next-round').textContent=state.round+1>=gameData.rounds.length?t().seeResults:t().nextRound;
  show('screen-round-summary');
}
function nextRound(){
  if(state.round+1>=gameData.rounds.length){showComplete();return;}
  state.round++;state.challenge=0;showRoundIntro();
}
function showComplete(){
  const pct=state.score/state.maxScore;
  const idx=pct>=.9?4:pct>=.75?3:pct>=.5?2:pct>=.25?1:0;
  $('complete-heading').textContent=t().gameComplete;
  $('final-score').textContent=state.score;
  $('final-title').textContent=t().titles[idx];
  $('final-desc').textContent=t().titleDescs[idx];
  $('btn-play-again').textContent=t().playAgain;
  $('btn-all-games').textContent=t().allGames;
  const grid=$('concepts-grid');grid.innerHTML='';
  t().concepts.forEach(([ti,de])=>{
    const card=document.createElement('div');card.className='concept-card';
    card.innerHTML=`<div class="cc-title">${ti}</div><div class="cc-desc">${de}</div>`;
    grid.appendChild(card);
  });
  show('screen-complete');
}
function updateProgress(){
  $('progress-fill').style.width=`${(state.completedChallenges/state.totalChallenges)*100}%`;
  $('progress-label').textContent=t().stepN(state.completedChallenges+1,state.totalChallenges);
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    if($('next-row').style.display!=='none'){$('btn-next').click();return;}
    const active=document.querySelector('.screen.active');
    if(active){const btn=active.querySelector('.btn-primary');if(btn)btn.click();}
  }
});

// Window resize
window.addEventListener('resize',()=>{if(document.querySelector('#screen-play.active'))showChallenge();});

// Auto-start if lang passed via URL
const urlLang=new URLSearchParams(window.location.search).get('lang');
if(urlLang&&GAME_DATA_ALL[urlLang]){init();startWithLang(urlLang);}else{init();}
</script>
